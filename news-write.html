<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>글쓰기 | 분당 욕실 리모델링</title><link rel="stylesheet" href="styles.css"></head><body><nav class="topbar"><div class="shell topbar-inner"><a class="brand" href="index.html">머니라함 욕실 리모델링</a><div class="navlinks"><a href="news.html">뉴스&소식</a><a class="active" href="news-write.html">글쓰기</a></div><a class="btn btn-primary" href="admin.html">관리자</a></div></nav><main class="admin-wrap shell"><div class="form-card"><span class="eyebrow">Editor</span><h1 id="form-title">새 글 작성</h1><form id="post-form"><div class="field"><label for="title">제목</label><input id="title" required maxlength="120"></div><div class="field"><label for="category">카테고리</label><select id="category"><option>시공 후기</option><option>인테리어 팁</option><option>공지</option></select></div><div class="field"><label for="date">작성일</label><input id="date" type="date" required></div><div class="field"><label for="content">본문 마크다운</label><textarea id="content" required placeholder="# 제목\n\n본문을 마크다운으로 작성하세요."></textarea></div><p id="form-message" class="notice"></p><div class="form-actions"><button class="btn btn-primary" type="submit">저장하기</button><a class="btn btn-ghost" href="admin.html">취소</a></div></form></div></main><nav class="mobile-nav"><a href="index.html">홈</a><a href="news.html">소식</a><a href="admin.html">관리</a></nav><script src="db.js"></script><script>(async()=>{if(!requireAdmin())return;const params=new URLSearchParams(location.search),id=params.get('id'),posts=await getPosts(),existing=posts.find(p=>String(p.id)===String(id));if(existing){document.querySelector('#form-title').textContent='게시글 수정';title.value=existing.title||'';category.value=existing.category||'시공 후기';date.value=existing.date||'';content.value=existing.content||''}else date.value=new Date().toISOString().slice(0,10);document.querySelector('#post-form').addEventListener('submit',async e=>{e.preventDefault();const msg=document.querySelector('#form-message');msg.textContent='저장 중입니다.';const post={id:existing?.id,title:title.value.trim(),category:category.value,date:date.value,content:content.value};try{if(existing)await updatePost(post);else await createPost(post);location.href='admin.html'}catch(err){msg.textContent=err.message}})})().catch(e=>document.querySelector('#form-message').textContent=e.message);</script></body></html>
