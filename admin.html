<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>관리자 | 분당 욕실 리모델링</title><link rel="stylesheet" href="styles.css"></head><body><div id="app"></div><nav class="mobile-nav"><a href="index.html">홈</a><a href="news.html">소식</a><a href="admin.html">관리</a></nav><script src="db.js"></script><script>(async()=>{const app=document.querySelector('#app');const cfg=await loadConfig();function login(){app.innerHTML=`<main class="login-shell"><form class="login-card" id="login-form"><span class="eyebrow">Private workspace</span><h1>관리자 로그인</h1><div class="field"><label for="password">비밀번호</label><input id="password" type="password" autocomplete="current-password" required></div><p id="login-error" class="notice"></p><button class="btn btn-primary" style="width:100%" type="submit">로그인</button></form></main>`;document.querySelector('#login-form').addEventListener('submit',e=>{e.preventDefault();if(document.querySelector('#password').value===cfg.admin_password){sessionStorage.setItem('isAdmin','true');location.reload()}else document.querySelector('#login-error').textContent='비밀번호가 올바르지 않습니다.'})}async function dashboard(){app.innerHTML=`<main class="admin-wrap shell"><header class="admin-header"><div><span class="eyebrow">Content control</span><h1>게시글 관리</h1></div><div class="admin-actions"><a class="btn btn-primary" href="news-write.html">새 글 작성</a><button class="btn btn-ghost" id="logout">로그아웃</button></div></header><div id="table-wrap" class="loading">게시글을 불러오는 중입니다.</div></main>`;document.querySelector('#logout').onclick=()=>{sessionStorage.removeItem('isAdmin');location.reload()};const wrap=document.querySelector('#table-wrap');try{const posts=await getPosts();wrap.innerHTML=posts.length?`<table class="admin-table"><thead><tr><th>번호</th><th>카테고리</th><th>제목</th><th>작성일</th><th>관리</th></tr></thead><tbody>${posts.map((p,i)=>`<tr><td>${posts.length-i}</td><td>${escapeHtml(p.category||'')}</td><td>${escapeHtml(p.title||'')}</td><td>${escapeHtml(p.date||'')}</td><td class="table-actions"><a class="text-button" href="news-write.html?id=${encodeURIComponent(p.id)}">수정</a><button class="text-button danger" data-id="${escapeHtml(p.id)}">삭제</button></td></tr>`).join('')}</tbody></table>`:'<div class="empty">작성된 게시글이 없습니다.</div>';wrap.querySelectorAll('[data-id]').forEach(btn=>btn.onclick=async()=>{if(!confirm('이 게시글을 삭제할까요?'))return;try{await deletePost(btn.dataset.id);dashboard()}catch(e){alert(e.message)}})}catch(e){wrap.innerHTML=`<div class="error">${escapeHtml(e.message)}</div>`}}if(isAdmin())dashboard();else login()})().catch(e=>document.querySelector('#app').innerHTML=`<main class="login-shell"><div class="error">${escapeHtml(e.message)}</div></main>`);</script></body></html>
