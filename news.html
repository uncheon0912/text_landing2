<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>최신 소식 | 분당 욕실 리모델링</title><link rel="stylesheet" href="styles.css"></head><body><nav class="topbar"><div class="shell topbar-inner"><a class="brand" href="index.html">머니라함 욕실 리모델링</a><div class="navlinks"><a href="index.html">시공사례</a><a class="active" href="news.html">뉴스&소식</a><a href="index.html#contact">견적문의</a></div><a class="btn btn-primary" href="tel:01012345678">전화 상담</a></div></nav><main class="shell"><header class="page-head"><span class="eyebrow">Magazine</span><h1>최신 소식</h1><p>현장 이야기와 욕실 관리 노하우를 전합니다.</p></header><div class="board-layout"><section><div class="board-tools"><div class="filters"><button class="filter active" data-category="전체">전체</button><button class="filter" data-category="시공 후기">시공 후기</button><button class="filter" data-category="인테리어 팁">인테리어 팁</button></div><label class="search"><span>⌕</span><input id="search-input" type="search" placeholder="게시글 검색"></label></div><div id="news-list" class="post-list"><div class="loading">게시글을 불러오는 중입니다.</div></div></section><aside class="sidebar"><img src="main_image/무지프로필.png" alt="대표 전문가 프로필"><h3>분당 욕실 리모델링</h3><p>현장을 아는 전문가의 정직한 리모델링 이야기입니다.</p><a class="btn btn-primary" href="tel:01012345678">상담 예약하기</a></aside></div></main><footer class="footer"><div class="shell footer-grid"><div><h3>분당 욕실 리모델링</h3><p>경기도 성남시 분당구 인테리어 전문 기업</p></div><div><h3>고객 지원</h3><ul><li><a href="index.html#contact">문의하기</a></li></ul></div><div><h3>문의</h3><ul><li><a href="tel:01012345678">010-1234-5678</a></li></ul></div><div><h3>관리</h3><ul><li><a href="admin.html">Agent Login</a></li></ul></div></div></footer><nav class="mobile-nav"><a href="index.html">홈</a><a href="news.html">소식</a><a href="admin.html">관리</a></nav><script src="db.js"></script><script>let posts=[],category='전체';const list=document.querySelector('#news-list');const search=document.querySelector('#search-input');function draw(){const q=search.value.trim().toLowerCase();const filtered=posts.filter(p=>(category==='전체'||p.category===category)&&(!q||`${p.title} ${p.content}`.toLowerCase().includes(q)));list.innerHTML=filtered.length?filtered.map(p=>`<a class="post-card" href="news-detail.html?id=${encodeURIComponent(p.id)}"><div class="post-thumb"><img src="main_image/무지프로필.png" alt=""></div><div><div class="post-meta"><span class="badge">${escapeHtml(p.category||'소식')}</span><span>${escapeHtml(p.date||'')}</span></div><h2>${escapeHtml(p.title||'제목 없음')}</h2><p>${escapeHtml(markdownToText(p.content).slice(0,120))}</p></div></a>`).join(''):'<div class="empty">작성된 게시글이 없습니다.</div>'}getPosts().then(x=>{posts=x;draw()}).catch(()=>list.innerHTML='<div class="error">게시글을 불러오지 못했습니다.</div>');search.addEventListener('input',draw);document.querySelectorAll('.filter').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.filter').forEach(x=>x.classList.remove('active'));b.classList.add('active');category=b.dataset.category;draw()}));</script></body></html>
