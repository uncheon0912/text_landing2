<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>게시글 | 분당 욕실 리모델링</title><link rel="stylesheet" href="styles.css"></head><body><nav class="topbar"><div class="shell topbar-inner"><a class="brand" href="index.html">머니라함 욕실 리모델링</a><div class="navlinks"><a href="index.html">시공사례</a><a class="active" href="news.html">뉴스&소식</a><a href="index.html#contact">견적문의</a></div><a class="btn btn-primary" href="tel:01012345678">전화 상담</a></div></nav><main class="shell" style="padding:78px 0 110px"><article class="article"><div id="detail"><div class="loading">게시글을 불러오는 중입니다.</div></div></article></main><nav class="mobile-nav"><a href="index.html">홈</a><a href="news.html">소식</a><a href="admin.html">관리</a></nav><script src="db.js"></script><script>const id=new URLSearchParams(location.search).get('id');const detail=document.querySelector('#detail');getPosts().then(posts=>{const p=posts.find(x=>String(x.id)===String(id));if(!p){detail.innerHTML='<div class="empty">게시글을 찾을 수 없습니다.</div>';return}document.title=`${p.title} | 분당 욕실 리모델링`;detail.innerHTML=`<div class="article-meta"><span class="badge">${escapeHtml(p.category||'소식')}</span> · ${escapeHtml(p.date||'')}</div><h1>${escapeHtml(p.title||'제목 없음')}</h1><div class="markdown">${renderMarkdown(p.content||'')}</div><div class="article-actions"><a class="btn btn-ghost" href="news.html">목록으로</a>${isAdmin()?`<a class="btn btn-primary" href="news-write.html?id=${encodeURIComponent(p.id)}">수정</a><button class="btn btn-dark" id="delete-btn">삭제</button>`:''}</div>`;document.querySelector('#delete-btn')?.addEventListener('click',async()=>{if(!confirm('이 게시글을 삭제할까요?'))return;try{await deletePost(p.id);location.href='news.html'}catch(e){alert(e.message)}})}).catch(()=>detail.innerHTML='<div class="error">게시글을 불러오지 못했습니다.</div>');</script></body></html>
