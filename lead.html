<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>상담 신청 | 분당 욕실 리모델링</title><link rel="stylesheet" href="styles.css"></head><body><nav class="topbar"><div class="shell topbar-inner"><a class="brand" href="index.html">머니라함 욕실 리모델링</a><div class="navlinks"><a href="index.html">시공사례</a><a href="news.html">뉴스&소식</a><a class="active" href="lead.html">견적문의</a></div><a class="btn btn-primary" href="tel:01012345678">전화 상담</a></div></nav><main class="admin-wrap shell"><div class="form-card lead-card"><span class="eyebrow">Consultation</span><h1>상담 예약 및 견적 문의</h1><p class="lead-intro">성남 지역 욕실 리모델링 상담을 남겨주시면 확인 후 연락드리겠습니다.</p><form id="lead-form"><div class="field"><label for="name">이름</label><input id="name" name="name" required maxlength="80" placeholder="홍길동"></div><div class="field"><label for="phone">연락처</label><input id="phone" name="phone" type="tel" required maxlength="40" placeholder="010-1234-5678"></div><div class="field"><label for="email">이메일 <span class="optional">선택</span></label><input id="email" name="email" type="email" maxlength="120" placeholder="example@email.com"></div><div class="field"><label for="message">문의 내용</label><textarea id="message" name="message" required maxlength="3000" placeholder="원하시는 시공 내용이나 상담 시간을 적어주세요."></textarea></div><p id="lead-message" class="notice"></p><button class="btn btn-primary" type="submit">상담 신청하기</button></form></div></main><footer class="footer"><div class="shell footer-grid"><div><h3>분당 욕실 리모델링</h3><p>경기도 성남시 분당구 인테리어 전문 기업</p></div><div><h3>고객 지원</h3><ul><li><a href="news.html">뉴스&소식</a></li></ul></div><div><h3>문의</h3><ul><li><a href="tel:01012345678">010-1234-5678</a></li></ul></div><div><h3>관리</h3><ul><li><a href="admin.html">Agent Login</a></li></ul></div></div></footer><nav class="mobile-nav"><a href="index.html">홈</a><a href="news.html">소식</a><a href="lead.html">문의</a></nav><script>const form=document.querySelector('#lead-form'),message=document.querySelector('#lead-message');form.addEventListener('submit',async event=>{event.preventDefault();message.className='notice';message.textContent='접수 중입니다.';const data=Object.fromEntries(new FormData(form));try{const response=await fetch('/api/lead',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const result=await response.json();if(!response.ok)throw new Error(result.message||'접수에 실패했습니다.');message.className=result.emailSent?'notice success':'notice';message.textContent=result.message;if(result.ok)form.reset()}catch(error){message.className='notice';message.textContent=error.message}});</script></body></html>
